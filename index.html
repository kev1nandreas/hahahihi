<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unduh Dataset Misteri</title>
<style>
  :root { --bg:#0f1020; --card:#1b1d33; --accent:#7c5cff; --text:#e8e8f0; --muted:#9a9ab0; }
  * { box-sizing: border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #2a2150, var(--bg));
    color: var(--text); padding: 24px;
  }
  .card {
    background: var(--card); border:1px solid #2c2e4a; border-radius:18px;
    padding:32px; width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,.45);
  }
  h1 { margin:0 0 6px; font-size:1.5rem; }
  p.sub { margin:0 0 24px; color:var(--muted); font-size:.92rem; line-height:1.5; }
  label { display:block; font-size:.85rem; color:var(--muted); margin-bottom:8px; }
  input {
    width:100%; padding:14px 16px; border-radius:12px; border:1px solid #34375a;
    background:#12132a; color:var(--text); font-size:1rem; outline:none; letter-spacing:.5px;
  }
  input:focus { border-color: var(--accent); }
  button {
    margin-top:18px; width:100%; padding:14px; border:0; border-radius:12px;
    background: var(--accent); color:white; font-size:1rem; font-weight:600; cursor:pointer;
    transition: transform .05s ease, opacity .2s;
  }
  button:hover { opacity:.92; }
  button:active { transform: translateY(1px); }
  .msg { margin-top:16px; font-size:.9rem; min-height:1.2em; }
  .msg.error { color:#ff7a8a; }
  .msg.ok { color:#5cdb95; }
  .hint { margin-top:22px; font-size:.78rem; color:var(--muted); border-top:1px solid #2c2e4a; padding-top:14px; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔐 Unduh Dataset</h1>
    <p class="sub">Masukkan NRP dan download dataset. Temukan rahasia di dalamnya.</p>

    <label for="nrp">NRP Mahasiswa</label>
    <input id="nrp" type="text" inputmode="numeric" placeholder="contoh: 5025221001" autocomplete="off">

    <button id="btn">Download</button>
    <div id="msg" class="msg"></div>

    <div class="hint">Petunjuk: jawabannya tersembunyi di antara ribuan kata.
       Frekuensi belaka tak akan cukup, kata yang paling <em>khas</em>-lah yang berbicara.</div>
  </div>

<script src="data.js"></script>
<script>
  // ---- PRNG deterministik berbasis seed (mulberry32) ----
  function hashNRP(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return (h ^= h >>> 16) >>> 0;
  }
  function mulberry32(seed) {
    return function () {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  // Fisher-Yates shuffle dengan PRNG ber-seed
  function shuffleSeeded(arr, rand) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // SALT + iterasi disuntikkan otomatis oleh build_website.py dari .env.
  // JANGAN edit blok ini manual.
  /* BUILD-INJECT-START */
  const SALT = "d017ce1c4e8abcfedd8d6fb8e44896815db0b6fceb9bd80b94fb345bf5813def";
  const PBKDF2_ITERATIONS = 200000;
  /* BUILD-INJECT-END */

  // PBKDF2-HMAC-SHA256(nrp, SALT, iterasi) -> hex string.
  // Iterasi tinggi membuat brute-force rentang NRP sangat lambat.
  // HARUS identik dengan hash_nrp() di build_website.py.
  async function hashNRP_pbkdf2(nrp) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(nrp), { name: "PBKDF2" }, false, ["deriveBits"]
    );
    const bits = await crypto.subtle.deriveBits(
      {
        name: "PBKDF2",
        salt: enc.encode(SALT),
        iterations: PBKDF2_ITERATIONS,
        hash: "SHA-256",
      },
      keyMaterial,
      256 // 32 byte, sama dengan pbkdf2_hmac default Python
    );
    return [...new Uint8Array(bits)]
      .map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function tentukanJenis(nrp) {
    const h = await hashNRP_pbkdf2(nrp);
    // Hanya NRP yang terdaftar yang diterima; SELAIN ITU dianggap ditolak.
    return DATA.hash_diterima.includes(h) ? "diterima" : "ditolak";
  }

  async function unduh(nrp) {
    const msg = document.getElementById("msg");
    const jenis = await tentukanJenis(nrp);
    const seed = hashNRP(nrp);
    const rand = mulberry32(seed);
    const barisAcak = shuffleSeeded(DATA[jenis], rand);
    const isi = barisAcak.join("\n");

    const blob = new Blob([isi], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "dataset_" + nrp + ".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    msg.className = "msg ok";
    msg.textContent = "Dataset-mu sedang diunduh. Selamat menganalisis! 🔍";
  }

  document.getElementById("btn").addEventListener("click", async () => {
    const nrp = document.getElementById("nrp").value.trim();
    if (!nrp) {
      const msg = document.getElementById("msg");
      msg.className = "msg error";
      msg.textContent = "Masukkan NRP-mu dulu.";
      return;
    }
    await unduh(nrp);
  });
  document.getElementById("nrp").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btn").click();
  });
</script>
</body>
</html>
